<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">NUOVA FORZA Hero Background</title>
  <desc id="desc">Fondo abstracto de gimnasio en tonos oscuros y acentos rojos</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b0b" />
      <stop offset="45%" stop-color="#141414" />
      <stop offset="100%" stop-color="#1f0b0b" />
    </linearGradient>
    <radialGradient id="glowTop" cx="0.82" cy="0.08" r="0.5">
      <stop offset="0%" stop-color="#ff1f1f" stop-opacity="0.38" />
      <stop offset="100%" stop-color="#ff1f1f" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowLeft" cx="0.06" cy="0.78" r="0.55">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <pattern id="mesh" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" />
    </pattern>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06" />
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#mesh)" />
  <rect width="1600" height="900" fill="url(#glowTop)" />
  <rect width="1600" height="900" fill="url(#glowLeft)" />

  <g fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2">
    <path d="M0 650H1600" />
    <path d="M0 710H1600" />
    <path d="M0 770H1600" />
    <path d="M0 830H1600" />
  </g>

  <g opacity="0.42">
    <rect x="280" y="270" width="1040" height="16" rx="8" fill="url(#bar)" />
    <rect x="340" y="360" width="920" height="12" rx="6" fill="url(#bar)" />
    <rect x="400" y="430" width="800" height="10" rx="5" fill="url(#bar)" />
  </g>

  <g fill="#ff1f1f" fill-opacity="0.18">
    <polygon points="1160,170 1420,170 1260,410" />
    <polygon points="0,900 320,660 540,900" />
  </g>

  <g fill="#ffffff" fill-opacity="0.08">
    <circle cx="1260" cy="180" r="230" />
    <circle cx="220" cy="760" r="190" />
  </g>
</svg>
